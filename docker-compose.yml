services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: geo-backend
    environment:
      FLASK_PORT: 5000
      FLASK_DEBUG: "false"
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-geo-monitor-local-secret}
      SCHEDULER_ROLE: disabled
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com/api}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5}
      OLLAMA_MODELS: ${OLLAMA_MODELS:-qwen3.5}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-40}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: geo-scheduler
    command: ["python", "scheduler_runner.py"]
    working_dir: /app/backend
    profiles:
      - scheduler
    environment:
      FLASK_DEBUG: "false"
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-geo-monitor-local-secret}
      SCHEDULER_ROLE: worker
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com/api}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5}
      OLLAMA_MODELS: ${OLLAMA_MODELS:-qwen3.5}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-40}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: geo-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
