databases:
  - name: geo-db
    databaseName: geo_dashboard
    user: geo_user

services:
  # Backend Flask
  - type: web
    name: geo-dashboard-backend
    env: python
    region: frankfurt
    plan: free
    # Force pip instead of Poetry
    packageManager: pip
    # Uvicorn pour support async (Option 1) - timeout 120s pour LLM
    startCommand: "cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120 --loop asyncio"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_PORT
        value: 5000
      - key: FLASK_DEBUG
        value: false
      - key: OLLAMA_BASE_URL
        value: https://ollama.com/api
      - key: OLLAMA_MODEL
        value: qwen3.5
      - key: OLLAMA_MODELS
        value: qwen3.5
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_TIMEOUT
        value: "40"
      - key: GUNICORN_TIMEOUT
        value: "120"
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  # Frontend React
  - type: staticSite
    name: geo-dashboard-frontend
    env: node
    region: frankfurt
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: VITE_API_URL
        sync: false
