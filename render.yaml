databases:
  - name: geo-db
    databaseName: geo_dashboard
    user: geo_user

services:
  # Backend Flask
  - type: web
    name: geo-dashboard-backend
    env: python
    region: frankfurt
    plan: free
    # Force pip instead of Poetry
    packageManager: pip
    # gthread worker avec timeout 120s pour streaming SSE
    startCommand: "cd backend && gunicorn --bind 0.0.0.0:$PORT --worker-class gthread --threads 4 --timeout 120 app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_PORT
        value: 5000
      - key: FLASK_DEBUG
        value: false
      - key: OLLAMA_BASE_URL
        value: https://ollama.com/api
      - key: OLLAMA_MODEL
        value: qwen3.5
      - key: OLLAMA_API_KEY
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  # Frontend React
  - type: staticSite
    name: geo-dashboard-frontend
    env: node
    region: frankfurt
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: VITE_API_URL
        sync: false
