databases:
  - name: geo-db
    databaseName: geo_dashboard
    user: geo_user

services:
  # Backend Flask
  - type: web
    name: geo-dashboard-backend
    env: python
    region: frankfurt
    plan: free
    # Force pip instead of Poetry
    packageManager: pip
    # Gunicorn avec worker gevent : heartbeat coopératif pendant les appels LLM bloquants
    startCommand: "cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --worker-class gevent --timeout 300 --keep-alive 300 --graceful-timeout 30"
    healthCheckPath: /api/health
    healthCheckInterval: 30s
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_PORT
        value: 5000
      - key: FLASK_DEBUG
        value: false
      - key: SCHEDULER_ROLE
        value: disabled
      - key: OLLAMA_BASE_URL
        value: https://ollama.com/api
      - key: OLLAMA_MODEL
        value: qwen3.5
      - key: OLLAMA_MODELS
        value: qwen3.5
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_TIMEOUT
        value: "40"
      - key: RENDER_INSTANCE_TYPE
        value: standard-0.5
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  - type: worker
    name: geo-dashboard-scheduler
    env: python
    region: frankfurt
    plan: starter
    packageManager: pip
    startCommand: "cd backend && python scheduler_runner.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_DEBUG
        value: false
      - key: SCHEDULER_ROLE
        value: worker
      - key: OLLAMA_BASE_URL
        value: https://ollama.com/api
      - key: OLLAMA_MODEL
        value: qwen3.5
      - key: OLLAMA_MODELS
        value: qwen3.5
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_TIMEOUT
        value: "40"
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  # Frontend React
  - type: staticSite
    name: geo-dashboard-frontend
    env: node
    region: frankfurt
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: VITE_API_URL
        sync: false
